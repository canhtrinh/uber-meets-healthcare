version: "1.0"

production:
  agent:
    name: NurseNow Dispatch Agent
    code_path: /agent
    entry_point: uvicorn server:app --host 0.0.0.0 --port 8008
    port: 8008
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

  actor:
    channels:
      - type: http
        url: http://localhost:8008/chat
        method: POST
        headers:
          Content-Type: application/json
        request:
          message_field: message
          session_field: session_id
        response:
          type: json
          message_field: response
    config:
      MAX_TURNS: "20"
